<html>
  <body></body>
 
  <script type="module">
    import Light from 'https://framework.light.tw/Asset/Light.mjs'

    let contentComponent

    var reloadPageContent = async () => {
      if (contentComponent !== undefined) contentComponent.remove()

      contentComponent = new Light(document.body.appendChild(Light.createElement('div')))

      contentComponent.load(await (await fetch('./page.html')).text())
    }

    reloadPageContent()
  </script>
</html>
