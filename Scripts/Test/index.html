<html>
  <head>
  </head>

  <body>
    <light:svg></light:svg>
    <div light:style="background-color: green; width: [5ps]; height: [5ps]; transition-duration: 1s" light:style:hover="transform: scale(1.1)"></div>
    <light-svg src="./happy.svg"></light-svg>
  </body>

  <script type="module">
    import Light from '../../Light-Framework/API.js'

    let app = new Light(document.body)

    let div = app.root.appendChild(Light.createElement('div', { style: { backgroundColor: 'black', width: '50px', height: '50px' }}))
    Light.Animation.keyframe(div, [
      { 'style.width': '0px' },
      { 'style.width': '100px' },
      { 'style.width': '50px' },
      { 'style.width': '150px' },
      { 'style.width': '0px' }
    ], { loop: true })
  </script>
</html>
