<html>
  <body>
    <div>
      <div id="app">
        
      </div>
    </div>
  </body>
 
  <script type="module">
    import Light from '../../Light-Framework/API.js'

    import Animation from '../../Plugins/Animation/Main.mjs'

    Light.use(Animation)

    new Light(document.body)

    let element = document.getElementById('app').appendChild(Light.createElement('div', { style: { backgroundColor: 'green', width: '[10ps]', height: '[10ps]', opacity: 0.5, transitionDuration: '0.5s' }, hover: { opacity: 1 }}))

    Light.setStyle(element, 'width', '[20ps]')
  </script>
</html>
